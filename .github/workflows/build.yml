name: Build Nuitka Executables

on:
  push:
    branches: [main, dev]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.os_name }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            os_name: Linux
            artifact_name: tiktok-sequencia-linux
            output_file: dist/tiktok-sequencia
            cache_path: ~/.cache/Nuitka

          - os: windows-latest
            os_name: Windows
            artifact_name: tiktok-sequencia-windows
            output_file: dist/tiktok-sequencia.exe
            cache_path: ~\AppData\Local\Nuitka\Nuitka

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install project dependencies
        run: uv sync --frozen --no-install-project

      - name: Cache Nuitka compilation files
        uses: actions/cache@v4
        with:
          path: ${{ matrix.cache_path }}
          key: nuitka-${{ matrix.os_name }}-${{ hashFiles('uv.lock', 'pyproject.toml') }}
          restore-keys: |
            nuitka-${{ matrix.os_name }}-

      - name: Build executable with Nuitka (onefile)
        run: |
          uv run --with-editable . --group build \
            python -m nuitka \
              --onefile \
              --standalone \
              --output-dir=dist \
              --output-filename=tiktok-sequencia \
              --assume-yes-for-downloads \
              ${{ matrix.os == 'windows-latest' && '--windows-disable-console' || '' }} \
              main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.output_file }}
          if-no-files-found: error
          compression-level: 6
          retention-days: 14

      - name: Show executable size
        shell: bash
        run: |
          if [ -f "${{ matrix.output_file }}" ]; then
            du -h "${{ matrix.output_file }}"
          else
            echo "File not found: ${{ matrix.output_file }}"
            exit 1
          fi