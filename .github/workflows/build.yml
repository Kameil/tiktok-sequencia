name: Build Nuitka Executables

on:
  push:
    branches: [main, dev]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install ccache
        run: sudo apt-get install -y ccache

      - name: Install project dependencies
        run: uv sync --frozen --no-install-project

      - name: Cache Nuitka compilation files
        uses: actions/cache@v5
        with:
          path: |
            .nuitka-cache
            dist/main.build
            dist/main.onefile-build
          key: nuitka-linux-${{ hashFiles('uv.lock', 'pyproject.toml', '**/*.py') }}
          restore-keys: |
            nuitka-linux-

      - name: Build executable with Nuitka (onefile)
        env:
          NUITKA_CACHE_DIR: ${{ github.workspace }}/.nuitka-cache
        run: |
          uv run --with-editable . --group build \
            python -m nuitka \
              --onefile \
              --output-dir=dist \
              --output-filename=tiktok-ttsk \
              --assume-yes-for-downloads \
              --static-libpython=yes \
              main.py

      - name: Verify and inspect executable
        run: |
          if [ ! -f "dist/tiktok-ttsk" ]; then
            echo "::error::Executable not found after build"
            ls -la dist/ || true
            exit 1
          fi
          chmod +x dist/tiktok-ttsk
          du -h dist/tiktok-ttsk

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: tiktok-ttsk-linux${{ github.ref_name == 'dev' && '-dev' || '' }}
          path: dist/tiktok-ttsk
          if-no-files-found: error
          compression-level: 6
          retention-days: 14

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install project dependencies
        run: uv sync --frozen --no-install-project

      - name: Cache Nuitka compilation files
        uses: actions/cache@v5
        with:
          path: |
            .nuitka-cache
            dist/main.build
            dist/main.onefile-build
          key: nuitka-windows-${{ hashFiles('uv.lock', 'pyproject.toml', '**/*.py') }}
          restore-keys: |
            nuitka-windows-

      - name: Build executable with Nuitka (onefile)
        shell: pwsh
        env:
          NUITKA_CACHE_DIR: ${{ github.workspace }}/.nuitka-cache
        run: |
          uv run --with-editable . --group build `
            python -m nuitka `
              --onefile `
              --output-dir=dist `
              --output-filename=tiktok-ttsk `
              --assume-yes-for-downloads `
              --windows-console-mode=disable `
              --include-windows-runtime-dlls=yes `
              main.py

      - name: Verify and inspect executable
        shell: pwsh
        run: |
          $exe = "dist/tiktok-ttsk.exe"
          if (-not (Test-Path $exe)) {
            Write-Error "Executable not found after build"
            Get-ChildItem dist\ -ErrorAction SilentlyContinue
            exit 1
          }
          $size = (Get-Item $exe).Length / 1MB
          Write-Output ("{0:N2} MB" -f $size)

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: tiktok-ttsk-windows${{ github.ref_name == 'dev' && '-dev' || '' }}
          path: dist/tiktok-ttsk.exe
          if-no-files-found: error
          compression-level: 6
          retention-days: 30
